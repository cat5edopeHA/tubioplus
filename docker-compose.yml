version: '3.8'

services:
  tubio:
    image: cat5edopeha/tubioplus:latest
    build: .          # omit this line (or run `docker compose build`) to build locally
    container_name: tubio
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      NODE_ENV: production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    restart: unless-stopped
    networks:
      - stremio-network

networks:
  stremio-network:
    driver: bridge
